name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release binary
        run: |
          set -euo pipefail
          swift build -c release

      - name: Package app bundle
        run: |
          set -euo pipefail

          APP_NAME="LeetBar"
          BUNDLE_ID="com.leetbar.app"
          VERSION="${GITHUB_REF_NAME:-dev}"
          VERSION_STRIPPED="${VERSION#v}"
          DIST_DIR="dist"
          APP_DIR="${DIST_DIR}/${APP_NAME}.app"
          ZIP_PATH="${DIST_DIR}/${APP_NAME}-${VERSION_STRIPPED}.zip"
          BIN_DIR="$(swift build -c release --show-bin-path)"
          BIN_PATH="${BIN_DIR}/${APP_NAME}"
          ICON_PATH="Resources/AppIcon.icns"

          rm -rf "${DIST_DIR}"
          mkdir -p "${APP_DIR}/Contents/MacOS" "${APP_DIR}/Contents/Resources"

          cp "${BIN_PATH}" "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${APP_DIR}/Contents/MacOS/${APP_NAME}"
          if [[ -f "${ICON_PATH}" ]]; then
            cp "${ICON_PATH}" "${APP_DIR}/Contents/Resources/AppIcon.icns"
          fi

          cat > "${APP_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>${BUNDLE_ID}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - "${APP_DIR}"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "${ZIP_PATH}"

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: leetbar-macos
          path: |
            dist/LeetBar-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged app artifact
        uses: actions/download-artifact@v4
        with:
          name: leetbar-macos
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Install
            - Download the asset named `LeetBar-<version>.zip` from **Assets**.
            - Do **not** use GitHub's auto-generated `Source code (zip)` file.
            - Unzip and open `LeetBar.app` to start the menu bar app.
          files: |
            dist/LeetBar-*.zip
